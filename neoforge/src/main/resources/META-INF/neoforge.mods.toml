modLoader = "javafml"
loaderVersion = "[1,)"
issueTrackerURL = "${github_url}/issues"
license = "${mod_license}"

[[mods]]
modId = "${mod_id}"
version = "${version}"
displayName = "${mod_name}"
authors = "${mod_author}"
description = '''
${mod_description}
'''
logoFile = "icon.png"

[[mixins]]
config = "matthiesen_core.mixins.json"

[[mixins]]
config = "matthiesen_core_neoforge.mixins.json"

[[dependencies.${mod_id}]]
modId = "minecraft"
mandatory = true
versionRange = "[1.21.1]"
ordering = "NONE"
side = "BOTH"

[[dependencies.${mod_id}]]
modId = "neoforge"
mandatory = true
versionRange = "[21.1.182,)"
ordering = "NONE"
side = "BOTH"

[[dependencies.${mod_id}]]
modId = "emberstextapi"
type = "optional"
mandatory = false
versionRange = "[3.0.0,)"
ordering = "AFTER"
side = "BOTH"