name: Publish Release to Modrinth

# Minimum Required Secrets:
# - MODRINTH_TOKEN (Modrinth API token with permissions to create versions)
# - DISCORD_WEBHOOK_URL (The URL of the Discord webhook to send notifications to)

on:
  release:
    types: [ published ]

# The dependencies below correspond to:
# - Embers Text API (OVSg4uGN) - Optional
## Fabric Only:
# - Fabric Permissions API (lzVo0Dll) - Optional

jobs:
  publish:
    uses: matthiesen-dev/automation/.github/workflows/simple-publish-with-maven.yml@main
    permissions:
      contents: write
    with:
      tag_name: ${{ github.event.release.tag_name }}
      artifact_basename: "matthiesen-core"
      mod_name: "Matthiesen Core"
      changelog: ${{ github.event.release.body }}
      fabric_loader_version: "0.17.2+"
      neoforge_loader_version: "21.1.182+"
      modrinth_game_version: "1.21.1"
      modrinth_id: "sqEZOmQo"
      modrinth_dependencies: |-
        [
          {"project_id":"OVSg4uGN","dependency_type":"optional"}
        ]
      modrinth_fabric_dependencies: |-
        [
          {"project_id":"lzVo0Dll","dependency_type":"optional"}
        ]
      discord_icon_url: "https://raw.githubusercontent.com/Matthiesen-dev/.github/refs/heads/main/logo-transparent.png"
    secrets:
      git_token: ${{ secrets.GITHUB_TOKEN }}
      MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      maven_username: ${{ secrets.ORG_GRADLE_PROJECT_DEVMATTHIESENMAVENUSERNAME }}
      maven_password: ${{ secrets.ORG_GRADLE_PROJECT_DEVMATTHIESENMAVENPASSWORD }}