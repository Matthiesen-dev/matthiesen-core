name: pr-snapshot.yml

on:
  pull_request:
    branches:
      - main

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.parsed_version.outputs.version }}
    steps:
      # Format `PR-1234-SNAPSHOT` where `1234` is the PR number
      - name: Generate version for PR snapshot
        id: parsed_version
        run: |
          echo "version=PR-${{ github.event.number }}-SNAPSHOT" >> $GITHUB_OUTPUT

  build:
    needs: [prepare]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Ensure Executable Permissions
        run: chmod +x ./gradlew

      - name: Build with Gradle and Publish to DevMatthiesenMavenRepository
        run: ./gradlew build publishAllPublicationsToDevMatthiesenMavenRepository
        env:
          ORG_GRADLE_PROJECT_devMatthiesenMavenUsername: ${{ secrets.ORG_GRADLE_PROJECT_DEVMATTHIESENMAVENUSERNAME }}
          ORG_GRADLE_PROJECT_devMatthiesenMavenPassword: ${{ secrets.ORG_GRADLE_PROJECT_DEVMATTHIESENMAVENPASSWORD }}
